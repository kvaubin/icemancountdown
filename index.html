<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iceman Magazine</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #1a1a1a, #000);
  font-family: -apple-system, sans-serif;
}

/* Center container */
#wrapper {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Magazine */
#magazine {
  width: 90vw;
  height: 90vh;
  box-shadow: 0 30px 80px rgba(0,0,0,0.8);
  border-radius: 10px;
  overflow: hidden;
}

/* Pages */
.page {
  background: black;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Subtle fade-in */
#magazine {
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.98); }
  to { opacity: 1; transform: scale(1); }
}

/* Page shadow effect */
.turn-page {
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="wrapper">
  <div id="magazine">
    <div class="page"><img src="pages/1.jpg"></div>
    <div class="page"><img src="pages/2.jpg"></div>
    <div class="page"><img src="pages/3.jpg"></div>
    <div class="page"><img src="pages/4.jpg"></div>
  </div>
</div>

<script>
$("#magazine").turn({
  width: document.getElementById("magazine").clientWidth,
  height: document.getElementById("magazine").clientHeight,
  autoCenter: true,
  display: "single",
  elevation: 50,
  gradients: true
});

// Resize handling
window.addEventListener("resize", () => {
  $("#magazine").turn(
    "size",
    document.getElementById("magazine").clientWidth,
    document.getElementById("magazine").clientHeight
  );
});
</script>

</body>
</html>
