<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iceman</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    html, body {
      height: 100%;
      background: #000;
      color: white;
      overflow: hidden;
    }

    .scroll-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    section {
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* ===== HERO ===== */
    #hero {
      background: url('icee.jpeg') center center / cover no-repeat;
      gap: 28px;
    }
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }
    #hero > * { position: relative; z-index: 1; }

    .logo img {
      width: 480px;
      max-width: 88vw;
      object-fit: contain;
    }

    .countdown {
      font-size: 28px;
      font-weight: 300;
      color: #fff;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .scroll-hint {
      position: absolute;
      bottom: 16px;
      z-index: 1;
      font-size: 10px;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.35);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(4px); }
    }

    /* ===== VIDEO ===== */
    #video-section {
      background: #000;
    }

    .video-wrapper {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .video-wrapper video {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }

    /* ===== LOADER ===== */
    .loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: opacity 0.8s ease;
    }
    .loader.hide { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .logo img { width: 80vw; }
      .countdown { font-size: 20px; letter-spacing: 5px; }
    }
  </style>
</head>
<body>

  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="scroll-container" id="scrollContainer">

    <!-- HERO -->
    <section id="hero">
      <div class="logo">
        <img src="logo.png" alt="Iceman">
      </div>
      <div class="countdown" id="countdown">Loading...</div>
      <div class="scroll-hint">↓ &nbsp; S C R O L L</div>
    </section>

    <!-- VIDEO -->
    <section id="video-section">
      <div class="video-wrapper">
        <video id="myVideo" autoplay loop muted playsinline preload="auto"
          controlsList="nodownload nofullscreen noremoteplayback"
          disablePictureInPicture>
          <source src="video.mp4" type="video/mp4">
        </video>
      </div>
    </section>

  </div>

  <script>
    // Countdown
    const target = new Date("2026-05-15T00:00:00").getTime();
    const countdownEl = document.getElementById("countdown");
    function tick() {
      const diff = target - Date.now();
      if (diff <= 0) { countdownEl.textContent = "OUT NOW"; return; }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff / 3600000) % 24);
      const m = Math.floor((diff / 60000) % 60);
      const s = Math.floor((diff / 1000) % 60);
      countdownEl.textContent = `${d}d  ${h}h  ${m}m  ${s}s`;
    }
    setInterval(tick, 1000);
    tick();

    // Loader
    const loader = document.getElementById("loader");
    setTimeout(() => loader.classList.add("hide"), 3000);

    // Hero fade on scroll
    const scrollContainer = document.getElementById("scrollContainer");
    const hero = document.getElementById("hero");
    scrollContainer.addEventListener("scroll", () => {
      const progress = Math.min(scrollContainer.scrollTop / window.innerHeight, 1);
      hero.style.opacity = 1 - progress * 1.8;
    });
  </script>

</body>
</html>
