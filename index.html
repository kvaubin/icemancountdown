<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iceman</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    html, body {
      height: 100%;
      background: #000;
      color: white;
      overflow: hidden;
    }

    .scroll-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    section {
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* ===== HERO ===== */
    #hero {
      background: url('background.jpeg') center center / cover no-repeat;
      gap: 24px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 0;
    }

    #hero > * { position: relative; z-index: 1; }

    .logo img {
      width: 220px;
      object-fit: contain;
    }

    .countdown {
      font-size: 18px;
      color: #ddd;
      letter-spacing: 4px;
    }

    .singles {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 880px;
      padding: 0 16px;
    }

    .singles iframe {
      width: 260px;
      height: 152px;
      border-radius: 12px;
      border: none;
    }

    .scroll-hint {
      position: absolute;
      bottom: 30px;
      z-index: 1;
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.4);
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(4px); }
    }

    /* ===== BOOKLET (untouched) ===== */
    #booklet {
      background: #000;
      padding: 0;
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .frame iframe {
      position: absolute;
      width: 124%;
      height: 124%;
      top: -12%;
      left: -12%;
      border: none;
    }

    /* ===== LOADER ===== */
    .loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: opacity 0.8s ease;
    }
    .loader.hide { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .logo img { width: 160px; }
      .singles iframe { width: 88vw; height: 140px; }
      .frame iframe { width: 130%; height: 130%; top: -15%; left: -15%; }
    }
  </style>
</head>
<body>

  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="scroll-container" id="scrollContainer">

    <!-- HERO -->
    <section id="hero">
      <div class="logo">
        <img src="logo.jpeg" alt="Iceman">
      </div>
      <div class="countdown" id="countdown">Loading...</div>

      <div class="singles">
        <iframe
          allow="autoplay *; encrypted-media *; fullscreen *"
          sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
          src="https://embed.music.apple.com/ca/album/what-did-i-miss/1824600278?i=1824600280">
        </iframe>
        <iframe
          allow="autoplay *; encrypted-media *; fullscreen *"
          sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
          src="https://embed.music.apple.com/ca/album/which-one/1828770371?i=1828770374">
        </iframe>
        <iframe
          allow="autoplay *; encrypted-media *; fullscreen *"
          sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
          src="https://embed.music.apple.com/ca/album/dog-house/1838368565?i=1838368566">
        </iframe>
      </div>

      <div class="scroll-hint">↓ &nbsp; S C R O L L</div>
    </section>

    <!-- BOOKLET -->
    <section id="booklet">
      <div class="frame">
        <iframe
          id="flipbook"
          src="https://heyzine.com/flip-book/cd6c7fb93b.html#page/1"
          allowfullscreen>
        </iframe>
      </div>
    </section>

  </div>

  <script>
    const target = new Date("2026-05-01T00:00:00").getTime();
    const countdownEl = document.getElementById("countdown");

    function tick() {
      const diff = target - Date.now();
      if (diff <= 0) { countdownEl.textContent = "OUT NOW"; return; }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff / 3600000) % 24);
      const m = Math.floor((diff / 60000) % 60);
      const s = Math.floor((diff / 1000) % 60);
      countdownEl.textContent = `${d}d  ${h}h  ${m}m  ${s}s`;
    }
    setInterval(tick, 1000);
    tick();

    const flipbook = document.getElementById("flipbook");
    const loader = document.getElementById("loader");
    flipbook.onload = () => loader.classList.add("hide");
    setTimeout(() => loader.classList.add("hide"), 5000);

    const scrollContainer = document.getElementById("scrollContainer");
    const hero = document.getElementById("hero");
    scrollContainer.addEventListener("scroll", () => {
      const progress = Math.min(scrollContainer.scrollTop / window.innerHeight, 1);
      hero.style.opacity = 1 - progress * 1.8;
    });
  </script>

</body>
</html>
