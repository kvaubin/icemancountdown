<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLUX Magazine</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{box-sizing:border-box;margin:0;padding:0}

:root{

  --page-w:420px;

  --page-h:580px;

}

body{

  background:#0a0a0f;

  height:100vh;

  display:flex;

  align-items:center;

  justify-content:center;

  overflow:hidden;

  font-family:'DM Sans',sans-serif;

}

/* BOOK */

.book-wrapper{

  perspective:2000px;

}

.book{

  width:calc(var(--page-w)*2 + 12px);

  height:var(--page-h);

  position:relative;

  transform:rotateX(4deg);

  transform-style:preserve-3d;

}

.spine{

  position:absolute;

  left:50%;

  width:12px;

  height:100%;

  transform:translateX(-50%);

  background:#1a0f30;

  z-index:10;

}

/* PAGES */

.page{

  position:absolute;

  width:var(--page-w);

  height:var(--page-h);

  background:#fff;

  overflow:hidden;

  display:flex;

  align-items:center;

  justify-content:center;

}

.left{left:0}

.right{left:calc(var(--page-w) + 12px)}

/* FLIPPER */

.flipper{

  position:absolute;

  width:var(--page-w);

  height:var(--page-h);

  left:calc(var(--page-w) + 12px);

  transform-origin:left;

  transform-style:preserve-3d;

  transition:transform .8s cubic-bezier(.645,.045,.355,1);

  z-index:50;

  pointer-events:none;

}

.flipper-front,.flipper-back{

  position:absolute;

  inset:0;

  backface-visibility:hidden;

  display:flex;

  align-items:center;

  justify-content:center;

}

.flipper-back{transform:rotateY(180deg)}

.do-flip{transform:rotateY(180deg)}

</style>

</head>

<body>

<div class="book-wrapper">

  <div class="book">

    <div class="spine"></div>

    <div class="page left" id="leftPage"></div>

    <div class="page right" id="rightPage"></div>

    <div class="flipper" id="flipper">

      <div class="flipper-front" id="flipFront"></div>

      <div class="flipper-back" id="flipBack"></div>

    </div>

  </div>

</div>

<script>

const PDF_URL = "book.pdf";

pdfjsLib.GlobalWorkerOptions.workerSrc =

"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let pdfDoc;

let totalPages = 0;

let currentSpread = 0;

let isAnimating = false;

let isFirstOpen = true;

const cache = {};

const leftPage = document.getElementById("leftPage");

const rightPage = document.getElementById("rightPage");

const flipper = document.getElementById("flipper");

const flipFront = document.getElementById("flipFront");

const flipBack = document.getElementById("flipBack");

/* 📖 FIXED MAGAZINE LOGIC */

function spreadToPages(i){

  if(i === 0) return [null,1];

  const base = (i-1)*2 + 2;

  return [base, base+1];

}

/* render page */

async function renderPage(num){

  if(!num) return null;

  if(cache[num]) return cache[num];

  const page = await pdfDoc.getPage(num);

  const vp = page.getViewport({scale:1.6});

  const canvas = document.createElement("canvas");

  canvas.width = vp.width;

  canvas.height = vp.height;

  await page.render({

    canvasContext: canvas.getContext("2d"),

    viewport: vp

  }).promise;

  cache[num] = canvas;

  return canvas;

}

function clone(c){

  if(!c) return null;

  const n = document.createElement("canvas");

  n.width = c.width;

  n.height = c.height;

  n.getContext("2d").drawImage(c,0,0);

  return n;

}

async function mount(el,num){

  el.innerHTML="";

  if(!num){

    el.style.background="#f2f2f2";

    return;

  }

  const c = await renderPage(num);

  el.appendChild(clone(c));

}

/* 🔥 HARD COVER OPEN */

async function openCover(){

  if(isAnimating) return;

  isAnimating = true;

  const cover = await renderPage(1);

  flipFront.innerHTML="";

  flipBack.innerHTML="";

  flipFront.appendChild(clone(cover));

  requestAnimationFrame(()=>{

    flipper.classList.add("do-flip");

  });

  await new Promise(r=>flipper.addEventListener("transitionend",r,{once:true}));

  isFirstOpen = false;

  currentSpread = 1;

  await mount(leftPage,null);

  await mount(rightPage,2);

  flipper.classList.remove("do-flip");

  isAnimating=false;

}

/* 📄 NORMAL PAGE TURN */

async function turn(dir){

  if(isAnimating) return;

  const target = currentSpread + dir;

  if(target<0 || target>=Math.ceil(totalPages/2)) return;

  isAnimating = true;

  const [curL,curR] = spreadToPages(currentSpread);

  const [newL,newR] = spreadToPages(target);

  flipFront.innerHTML="";

  flipBack.innerHTML="";

  const front = await renderPage(dir>0 ? curR : curL);

  const back  = await renderPage(dir>0 ? newL : newR);

  if(front) flipFront.appendChild(clone(front));

  if(back) flipBack.appendChild(clone(back));

  requestAnimationFrame(()=>{

    flipper.classList.add("do-flip");

  });

  await new Promise(r=>flipper.addEventListener("transitionend",r,{once:true}));

  currentSpread = target;

  await mount(leftPage,newL);

  await mount(rightPage,newR);

  flipper.classList.remove("do-flip");

  isAnimating=false;

}

/* CLICK */

document.body.addEventListener("click",(e)=>{

  if(isAnimating) return;

  if(isFirstOpen){

    openCover();

    return;

  }

  const mid = window.innerWidth/2;

  turn(e.clientX < mid ? -1 : 1);

});

/* BOOT */

async function boot(){

  pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;

  totalPages = pdfDoc.numPages;

  await mount(leftPage,null);

  await mount(rightPage,1);

}

boot();

</script>

</body>

</html>
