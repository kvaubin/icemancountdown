<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN Magazine</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hero h1{
  font-size:5rem;
  letter-spacing:12px;
}

#countdown{
  margin-top:20px;
  font-size:1.6rem;
  opacity:.7;
}

/* MAGAZINE */
.magazine{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  perspective:1800px;
}

.book{
  width:min(1200px,92vw);
  aspect-ratio:3/2;
  position:relative;
  overflow:hidden;
  background:#111;
  box-shadow:0 40px 120px rgba(0,0,0,.8);
  border-radius:2px;
}

/* spine */
.book::before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  width:3px;
  height:100%;
  background:rgba(255,255,255,.08);
  transform:translateX(-50%);
  z-index:5;
}

/* pages container */
.pages{
  width:100%;
  height:100%;
  display:flex;
  position:absolute;
  top:0;
  left:0;
}

.page{
  width:50%;
  height:100%;
  position:relative;
  overflow:hidden;
  background:#0b0b0b;
  transition:transform .6s ease, opacity .6s ease;
}

.page img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* subtle shadows */
.page.left{
  box-shadow:inset -30px 0 60px rgba(0,0,0,.6);
}

.page.right{
  box-shadow:inset 30px 0 60px rgba(0,0,0,.6);
}

/* flip animation layer */
.flip{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  right:0;
  transform-origin:left;
  z-index:10;
  background:#111;
  backface-visibility:hidden;
  transition:transform .7s cubic-bezier(.2,.8,.2,1);
}

.flip img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.flip.turn{
  transform:rotateY(-180deg);
}

/* hint */
.hint{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:.4;
}

</style>
</head>
<body>

<section class="hero">
  <h1>ICEMAN</h1>
  <div id="countdown"></div>
</section>

<section class="magazine">
  <div class="book" id="book"></div>
</section>

<script>

/* COUNTDOWN */
const releaseDate = new Date("2026-07-01T00:00:00");

function updateCountdown(){
  const now=new Date();
  const diff=releaseDate-now;

  if(diff<=0){
    document.getElementById("countdown").innerText="OUT NOW";
    return;
  }

  const d=Math.floor(diff/86400000);
  const h=Math.floor(diff/3600000%24);
  const m=Math.floor(diff/60000%60);
  const s=Math.floor(diff/1000%60);

  document.getElementById("countdown").innerText=
    `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateCountdown,1000);
updateCountdown();

/* CLEAN MAGAZINE DATA */
const pages=[
  {left:"img1.jpeg",right:"img2.jpeg"},
  {left:"img3.jpeg",right:"img4.jpeg"},
  {left:"img5.jpeg",right:"img6.jpeg"}
];

let index=0;
const book=document.getElementById("book");

function render(){
  const p=pages[index];

  book.innerHTML=`
    <div class="pages">
      <div class="page left"><img src="${p.left}"></div>
      <div class="page right"><img src="${p.right}"></div>
    </div>
    <div class="flip" id="flip"><img src="${p.right}"></div>
  `;
}

function next(){
  const flip=document.getElementById("flip");
  if(index>=pages.length-1) return;

  flip.classList.add("turn");

  setTimeout(()=>{
    index++;
    render();
  },600);
}

function prev(){
  if(index<=0) return;
  index--;
  render();
}

/* swipe */
let startX=0;

document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);

document.addEventListener("touchend",e=>{
  let dx=startX-e.changedTouches[0].clientX;
  if(dx>50) next();
  if(dx<-50) prev();
});

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") next();
  if(e.key==="ArrowLeft") prev();
});

render();

</script>

</body>
</html>
