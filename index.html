<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iceman Magazine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: #0b0b0b;
      color: white;
      overflow: hidden;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    header a {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s;
    }

    header a:hover {
      color: white;
    }

    /* Book container */
    .viewer {
      position: absolute;
      top: 70px;
      left: 0;
      width: 100%;
      height: calc(100vh - 70px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    iframe.loaded {
      opacity: 1;
    }

    /* Loading screen */
    .loader {
      position: absolute;
      top: 70px;
      left: 0;
      width: 100%;
      height: calc(100vh - 70px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0b0b;
      z-index: 5;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Optional logo cover (hack) */
    .logo-cover {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 110px;
      height: 40px;
      background: #0b0b0b;
      pointer-events: none;
      z-index: 6;
    }

    /* Mobile tweaks */
    @media (max-width: 768px) {
      header {
        height: 60px;
        padding: 0 20px;
      }

      .viewer,
      .loader {
        top: 60px;
        height: calc(100vh - 60px);
      }
    }

  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <h1>ICEMAN</h1>
    <a href="#">Issue 01</a>
  </header>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <!-- Flipbook -->
  <div class="viewer">
    <iframe 
      id="flipbook"
      src="https://heyzine.com/flip-book/46b787281d.html"
      allowfullscreen>
    </iframe>

    <!-- optional logo hide hack -->
    <div class="logo-cover"></div>
  </div>

  <script>
    const iframe = document.getElementById("flipbook");
    const loader = document.getElementById("loader");

    iframe.onload = () => {
      iframe.classList.add("loaded");
      loader.style.display = "none";
    };
  </script>

</body>
</html>
