<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUX Magazine</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --page-w: 420px;
  --page-h: 580px;
}

body {
  background: #0a0a0f;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  user-select: none;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(120,60,220,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 40%, rgba(255,90,60,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 90%, rgba(0,180,200,0.10) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}

/* LOADING SCREEN */
#loadScreen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  gap: 20px;
  transition: opacity 0.6s ease;
}

#loadScreen.hidden {
  opacity: 0;
  pointer-events: none;
}

.load-logo {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  font-weight: 900;
  font-style: italic;
  color: #fff;
  letter-spacing: -2px;
  text-shadow: 0 0 60px rgba(160,80,255,0.5);
}

.load-bar-wrap {
  width: 220px;
  height: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}

.load-bar {
  height: 100%;
  background: linear-gradient(90deg, #8040ff, #c070ff);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s ease;
}

.load-status {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.4em;
  color: rgba(200,150,255,0.6);
  text-transform: uppercase;
  text-align: center;
  max-width: 300px;
  line-height: 1.6;
}

/* SCENE */
.scene {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  opacity: 0;
  transition: opacity 0.8s ease;
}

.scene.visible { opacity: 1; }

.mag-title {
  font-family: 'Space Mono', monospace;
  color: rgba(255,255,255,0.22);
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  text-align: center;
}

/* BOOK */
.book-wrapper {
  position: relative;
  perspective: 2000px;
  perspective-origin: 50% 45%;
  cursor: pointer;
}

.book {
  position: relative;
  width: calc(var(--page-w) * 2 + 12px);
  height: var(--page-h);
  transform-style: preserve-3d;
  transform: rotateX(4deg);
  filter: drop-shadow(0 60px 80px rgba(0,0,0,0.9)) drop-shadow(0 20px 40px rgba(80,20,180,0.3));
  animation: book-rise 1s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes book-rise {
  from { opacity:0; transform:rotateX(4deg) translateY(60px) scale(0.92); }
  to   { opacity:1; transform:rotateX(4deg) translateY(0) scale(1); }
}

.spine {
  position: absolute;
  left: calc(50% - 6px);
  top: 0;
  width: 12px;
  height: 100%;
  background: linear-gradient(180deg,#2a1a4a 0%,#1a0f30 40%,#2a1a4a 100%);
  z-index: 10;
  border-left: 1px solid rgba(255,255,255,0.1);
  border-right: 1px solid rgba(255,255,255,0.05);
}

/* SPREADS */
.spread {
  position: absolute;
  top: 0;
  width: var(--page-w);
  height: var(--page-h);
}

.spread.left-spread  { left: 0; }
.spread.right-spread { left: calc(var(--page-w) + 12px); }

.page-face {
  position: absolute;
  inset: 0;
  overflow: hidden;
  background: #1a1020;
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page-face canvas {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain;
  display: block;
}

/* page edge shadows */
.spread.left-spread .page-face::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(0,0,0,0.2) 0%, transparent 25%);
  pointer-events: none;
  z-index: 5;
}

.spread.right-spread .page-face::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(270deg, rgba(0,0,0,0.2) 0%, transparent 25%);
  pointer-events: none;
  z-index: 5;
}

/* FLIPPER */
.flipper {
  position: absolute;
  top: 0;
  left: calc(var(--page-w) + 12px);
  width: var(--page-w);
  height: var(--page-h);
  transform-style: preserve-3d;
  transform-origin: left center;
  transition: transform 0.75s cubic-bezier(0.645,0.045,0.355,1.000);
  z-index: 20;
  pointer-events: none;
}

.flipper.flip-backward {
  left: 0;
  transform-origin: right center;
}

.flipper.do-flip-forward  { transform: rotateY(180deg); }
.flipper.do-flip-backward { transform: rotateY(-180deg); }

.flipper-front,
.flipper-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  overflow: hidden;
  border-radius: 2px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.flipper-back { transform: rotateY(180deg); }

.flipper-front canvas,
.flipper-back  canvas {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain;
  display: block;
}

.flipper-front::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 50%, rgba(0,0,0,0.3) 100%);
  pointer-events: none;
  z-index: 5;
}

.flipper-back::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(270deg, transparent 50%, rgba(0,0,0,0.3) 100%);
  pointer-events: none;
  z-index: 5;
}

/* CONTROLS */
.controls {
  display: flex;
  align-items: center;
  gap: 24px;
  position: relative;
  z-index: 1;
  animation: controls-rise 1s cubic-bezier(0.16,1,0.3,1) 0.3s both;
}

@keyframes controls-rise {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

.btn-page {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
  font-size: 20px;
}

.btn-page:hover:not(:disabled) {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.3);
  color: #fff;
  transform: scale(1.06);
}

.btn-page:active:not(:disabled) { transform: scale(0.97); }

.btn-page:disabled {
  opacity: 0.2;
  cursor: default;
}

.page-counter {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  min-width: 90px;
  text-align: center;
  letter-spacing: 0.08em;
}

.dots-wrap {
  display: flex;
  gap: 5px;
  align-items: center;
  flex-wrap: wrap;
  max-width: 220px;
  justify-content: center;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  transition: all 0.3s;
  cursor: pointer;
  flex-shrink: 0;
}

.dot.active {
  background: rgba(200,150,255,0.85);
  transform: scale(1.5);
}

.swipe-hint {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.15);
  text-transform: uppercase;
  text-align: center;
  animation: fade-hint 4s ease forwards 3s;
}

@keyframes fade-hint {
  to { opacity: 0; }
}

/* Error */
.err-page {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #1a0835;
  padding: 24px;
  text-align: center;
}

.err-page p {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: rgba(200,150,255,0.6);
  letter-spacing: 0.1em;
  line-height: 1.8;
}

.err-page strong {
  font-size: 28px;
  color: rgba(200,150,255,0.4);
}

/* Responsive */
@media (max-width: 900px) {
  :root { --page-w: min(44vw, 360px); --page-h: min(62vw, 500px); }
}

@media (max-width: 560px) {
  :root { --page-w: 45vw; --page-h: 63vw; }
  .btn-page { width: 38px; height: 38px; font-size: 16px; }
  .mag-title { font-size: 9px; }
}
</style>
</head>
<body>

<div id="loadScreen">
  <div class="load-logo">flux</div>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
  <div class="load-status" id="loadStatus">Opening book.pdf…</div>
</div>

<div class="scene" id="scene">
  <div class="mag-title" id="magTitle">FLUX Magazine</div>

  <div class="book-wrapper" id="bookWrapper">
    <div class="book">
      <div class="spine"></div>

      <div class="spread left-spread">
        <div class="page-face" id="leftPage"></div>
      </div>

      <div class="spread right-spread">
        <div class="page-face" id="rightPage"></div>
      </div>

      <div class="flipper" id="flipper">
        <div class="flipper-front" id="flipFront"></div>
        <div class="flipper-back"  id="flipBack"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-page" id="btnPrev" onclick="turnPage(-1)">←</button>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div class="dots-wrap" id="dotsWrap"></div>
      <div class="page-counter" id="pageCounter">— / —</div>
    </div>
    <button class="btn-page" id="btnNext" onclick="turnPage(1)">→</button>
  </div>

  <div class="swipe-hint">Swipe · Click · Arrow keys</div>
</div>

<script>
// ════════════════════════════════════════
//  CONFIG — change PDF_URL if needed
// ════════════════════════════════════════
const PDF_URL = 'book.pdf';   // Must sit in the same repo root as index.html
const RENDER_SCALE = 1.6;     // Higher = sharper but slower. 1.4–2.0 recommended.
const PRELOAD = 2;             // Spreads to preload ahead/behind

// ── PDF.js worker ──
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──
let pdfDoc       = null;
let totalPages   = 0;
let totalSpreads = 0;
let currentSpread = 0;
let isAnimating  = false;
const cache      = {};   // pageNum → HTMLCanvasElement

// ── DOM ──
const loadScreen  = document.getElementById('loadScreen');
const loadBar     = document.getElementById('loadBar');
const loadStatus  = document.getElementById('loadStatus');
const scene       = document.getElementById('scene');
const magTitle    = document.getElementById('magTitle');
const leftPage    = document.getElementById('leftPage');
const rightPage   = document.getElementById('rightPage');
const flipper     = document.getElementById('flipper');
const flipFront   = document.getElementById('flipFront');
const flipBack    = document.getElementById('flipBack');
const btnPrev     = document.getElementById('btnPrev');
const btnNext     = document.getElementById('btnNext');
const pageCounter = document.getElementById('pageCounter');
const dotsWrap    = document.getElementById('dotsWrap');

// ── Helpers ──
function spreadToPages(si) {
  const l = si * 2 + 1;
  const r = si * 2 + 2;
  return [l <= totalPages ? l : null, r <= totalPages ? r : null];
}

async function renderPage(num) {
  if (!num || num < 1 || num > totalPages) return null;
  if (cache[num]) return cache[num];

  const page     = await pdfDoc.getPage(num);
  const nativeVP = page.getViewport({ scale: 1 });

  // Fit to our display slot maintaining aspect ratio
  const dispW    = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--page-w')) || 420;
  const dispH    = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--page-h')) || 580;
  const scaleW   = dispW  / nativeVP.width;
  const scaleH   = dispH  / nativeVP.height;
  const scale    = Math.max(scaleW, scaleH) * RENDER_SCALE;

  const viewport = page.getViewport({ scale });
  const canvas   = document.createElement('canvas');
  canvas.width   = viewport.width;
  canvas.height  = viewport.height;

  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  cache[num] = canvas;
  return canvas;
}

function cloneCanvas(src) {
  if (!src) return null;
  const c = document.createElement('canvas');
  c.width  = src.width;
  c.height = src.height;
  c.getContext('2d').drawImage(src, 0, 0);
  return c;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Mount a page into a container ──
async function mount(container, num) {
  container.innerHTML = '';
  if (!num) {
    container.style.background = '#f5f0eb';
    return;
  }
  container.style.background = '#fff';
  const canvas = await renderPage(num);
  if (canvas) {
    container.appendChild(cloneCanvas(canvas));
  } else {
    container.innerHTML = `<div class="err-page"><strong>✦</strong><p>Page ${num} failed to render.<br>Ensure book.pdf is in your repo root.</p></div>`;
  }
}

// ── Preload nearby spreads ──
function preload(around) {
  const needed = new Set();
  for (let s = Math.max(0, around - 1); s <= Math.min(totalSpreads - 1, around + PRELOAD); s++) {
    const [l, r] = spreadToPages(s);
    if (l) needed.add(l);
    if (r) needed.add(r);
  }
  needed.forEach(n => { if (!cache[n]) renderPage(n).catch(() => {}); });
}

// ── Update UI chrome ──
function updateUI() {
  const [l, r] = spreadToPages(currentSpread);
  const from   = l || '—';
  const to     = (r && r !== l) ? '–' + r : '';
  pageCounter.textContent = `${from}${to} / ${totalPages}`;
  btnPrev.disabled = currentSpread === 0;
  btnNext.disabled = currentSpread === totalSpreads - 1;

  dotsWrap.innerHTML = '';
  if (totalSpreads <= 24) {
    for (let i = 0; i < totalSpreads; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === currentSpread ? ' active' : '');
      d.onclick   = () => goToSpread(i);
      dotsWrap.appendChild(d);
    }
  }
}

// ── Page turn ──
async function turnPage(dir) {
  await goToSpread(currentSpread + dir, dir);
}

async function goToSpread(target, dir) {
  if (isNaN(target) || target < 0 || target >= totalSpreads || target === currentSpread || isAnimating) return;
  dir = dir !== undefined ? dir : (target > currentSpread ? 1 : -1);
  isAnimating = true;

  const [curL, curR] = spreadToPages(currentSpread);
  const [newL, newR] = spreadToPages(target);

  if (dir > 0) {
    // ── Forward flip: right page folds left ──
    flipper.className      = 'flipper';
    flipper.style.left     = 'calc(var(--page-w) + 12px)';
    flipper.style.transformOrigin = 'left center';
    flipFront.innerHTML    = '';
    flipBack.innerHTML     = '';

    // Front of flipper = current right page
    const frontC = curR ? cloneCanvas(cache[curR] || await renderPage(curR)) : null;
    if (frontC) flipFront.appendChild(frontC);

    // Back of flipper = incoming left page
    const backC  = newL ? cloneCanvas(cache[newL] || await renderPage(newL)) : null;
    if (backC) flipBack.appendChild(backC);

    // Stage new right behind flipper
    mount(rightPage, newR);

    requestAnimationFrame(() => flipper.classList.add('do-flip-forward'));
    await waitFlip();

    currentSpread = target;
    await mount(leftPage, newL);
    resetFlipper();

  } else {
    // ── Backward flip: left page folds right ──
    flipper.style.left     = '0';
    flipper.style.transformOrigin = 'right center';
    flipper.className      = 'flipper flip-backward';
    flipFront.innerHTML    = '';
    flipBack.innerHTML     = '';

    const frontC = curL ? cloneCanvas(cache[curL] || await renderPage(curL)) : null;
    if (frontC) flipFront.appendChild(frontC);

    const backC  = newR ? cloneCanvas(cache[newR] || await renderPage(newR)) : null;
    if (backC) flipBack.appendChild(backC);

    mount(leftPage, newL);

    requestAnimationFrame(() => flipper.classList.add('do-flip-backward'));
    await waitFlip();

    currentSpread = target;
    await mount(rightPage, newR);
    resetFlipper();
  }

  isAnimating = false;
  updateUI();
  preload(currentSpread);
}

function waitFlip() {
  return new Promise(resolve => flipper.addEventListener('transitionend', resolve, { once: true }));
}

function resetFlipper() {
  flipper.className             = 'flipper';
  flipper.style.left            = '';
  flipper.style.transformOrigin = '';
  flipFront.innerHTML           = '';
  flipBack.innerHTML            = '';
}

// ── Load PDF ──
async function boot() {
  try {
    loadBar.style.width = '5%';
    loadStatus.textContent = 'Opening book.pdf…';

    const task = pdfjsLib.getDocument(PDF_URL);
    task.onProgress = ({ loaded, total }) => {
      if (total) {
        loadBar.style.width = (5 + Math.round(loaded / total * 70)) + '%';
        loadStatus.textContent = `Loading… ${Math.round(loaded / 1024)} KB`;
      }
    };

    pdfDoc       = await task.promise;
    totalPages   = pdfDoc.numPages;
    totalSpreads = Math.ceil(totalPages / 2);

    magTitle.textContent = `book.pdf  ·  ${totalPages} pages`;
    loadStatus.textContent = 'Rendering first spread…';
    loadBar.style.width = '82%';

    await Promise.all([renderPage(1), renderPage(2)]);
    loadBar.style.width = '100%';

    await sleep(280);
    loadScreen.classList.add('hidden');
    scene.classList.add('visible');

    await Promise.all([mount(leftPage, 1), mount(rightPage, 2)]);
    updateUI();
    preload(0);

  } catch (err) {
    console.error(err);
    loadBar.style.background = 'linear-gradient(90deg,#ff4040,#ff8040)';
    loadBar.style.width      = '100%';
    loadStatus.textContent   =
      'Could not load book.pdf\nMake sure the file is in your GitHub repo root\nand GitHub Pages is enabled.';
  }
}

// ── Input handling ──
let touchX = 0;
const bw = document.getElementById('bookWrapper');

bw.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
bw.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) turnPage(dx < 0 ? 1 : -1);
}, { passive: true });

bw.addEventListener('click', e => {
  if (isAnimating) return;
  const mid = e.currentTarget.getBoundingClientRect().left + e.currentTarget.getBoundingClientRect().width / 2;
  turnPage(e.clientX < mid ? -1 : 1);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') turnPage(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   turnPage(-1);
});

boot();
</script>
</body>
</html>
