<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN MAGAZINE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a0a;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== MAGAZINE FRAME ===== */
.mag {
  width: 90vw;
  height: 90vh;
  perspective: 3000px;
  position: relative;
}

/* spine */
.mag::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  background: rgba(255,255,255,0.08);
  transform: translateX(-50%);
  z-index: 10;
}

/* ===== STACKED PAGES ===== */
.page {
  position: absolute;
  width: 50%;
  height: 100%;
  top: 0;
  transform-style: preserve-3d;
  transition: transform 1s cubic-bezier(.2,.8,.2,1);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  background: black;
  overflow: hidden;
}

/* left page */
.left {
  left: 0;
  border-right: 1px solid rgba(255,255,255,0.05);
}

/* right page */
.right {
  right: 0;
  border-left: 1px solid rgba(255,255,255,0.05);
}

/* images */
.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  user-select: none;
  pointer-events: none;
}

/* ===== PAGE FLIP LAYERS ===== */
.flip-next-left {
  transform-origin: right;
  transform: rotateY(-180deg);
}

.flip-next-right {
  transform-origin: left;
  transform: rotateY(180deg);
}

/* paper depth illusion */
.page::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.4), transparent 40%, rgba(0,0,0,0.4));
  pointer-events: none;
}

/* subtle vignette */
.mag::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8));
  pointer-events: none;
}
</style>
</head>

<body>

<div class="mag" id="mag">

  <div class="page left" id="left">
    <img src="img1.jpeg">
  </div>

  <div class="page right" id="right">
    <img src="img2.jpeg">
  </div>

</div>

<script>
const pages = [
  "img1.jpeg",
  "img2.jpeg",
  "img3.jpeg",
  "img4.jpeg"
];

let index = 0;

const left = document.getElementById("left");
const right = document.getElementById("right");
const mag = document.getElementById("mag");

/* ===== RENDER ===== */
function render() {
  left.innerHTML = `<img src="${pages[index] || ''}">`;
  right.innerHTML = `<img src="${pages[index+1] || ''}">`;
}
render();

/* ===== REAL TURN ANIMATION ===== */
function turn(next = true) {

  const l = left;
  const r = right;

  if (next) {
    l.style.transform = "rotateY(-180deg)";
    r.style.transform = "rotateY(180deg)";
  } else {
    l.style.transform = "rotateY(0deg)";
    r.style.transform = "rotateY(0deg)";
  }

  setTimeout(() => {
    if (next) index += 2;
    else index -= 2;

    index = Math.max(0, Math.min(index, pages.length - 2));

    l.style.transform = "none";
    r.style.transform = "none";

    render();
  }, 600);
}

/* ===== SWIPE ===== */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let diff = startX - e.changedTouches[0].clientX;

  if (diff > 50) turn(true);
  if (diff < -50) turn(false);
});

/* desktop */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") turn(true);
  if (e.key === "ArrowLeft") turn(false);
});
</script>

</body>
</html>
