<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #050505;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ================= HERO ================= */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero h1 {
  font-size: 5rem;
  letter-spacing: 14px;
  font-weight: 600;
}

#countdown {
  margin-top: 20px;
  font-size: 1.8rem;
  opacity: 0.7;
  letter-spacing: 3px;
}

.scroll {
  position: absolute;
  bottom: 20px;
  opacity: 0.3;
  font-size: 12px;
}

/* ================= MAGAZINE ================= */
.magazine {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #111, #000);
}

/* ===== BOOK ===== */
.book {
  width: min(1000px, 92vw);
  height: 80vh;
  display: flex;
  box-shadow:
    0 40px 120px rgba(0,0,0,0.8),
    inset 0 0 120px rgba(0,0,0,0.5);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

/* spine */
.book::before {
  content: "";
  position: absolute;
  left: 50%;
  width: 2px;
  height: 100%;
  background: rgba(255,255,255,0.06);
  transform: translateX(-50%);
  z-index: 5;
}

/* pages */
.page {
  width: 50%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b0b0b;
  position: relative;
}

/* subtle paper texture */
.page::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.05;
  pointer-events: none;
}

/* images */
.page img {
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
  filter: contrast(1.05) brightness(0.95);
  user-select: none;
  pointer-events: none;
}

/* shadow depth */
.page.left {
  box-shadow: inset -40px 0 80px rgba(0,0,0,0.6);
}

.page.right {
  box-shadow: inset 40px 0 80px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<!-- ================= HERO ================= -->
<section class="hero">
  <h1>ICEMAN</h1>
  <div id="countdown"></div>
  <div class="scroll">↓ scroll</div>
</section>

<!-- ================= MAGAZINE ================= -->
<section class="magazine">

  <div class="book">

    <div class="page left">
      <img src="img1.jpeg">
    </div>

    <div class="page right">
      <img src="img2.jpeg">
    </div>

  </div>

</section>

<script>

/* ================= COUNTDOWN ================= */
const releaseDate = new Date("2026-07-01T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = releaseDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "OUT NOW";
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerText =
    `${d} : ${h} : ${m} : ${s}`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

</script>

</body>
</html>
