<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  color: white;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* ================= HERO ================= */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
}

.hero h1 {
  font-size: 5rem;
  letter-spacing: 12px;
}

.subtitle {
  opacity: 0.5;
  letter-spacing: 4px;
  margin-top: 10px;
}

#countdown {
  margin-top: 20px;
  font-size: 2rem;
  letter-spacing: 3px;
}

.scroll-hint {
  position: absolute;
  bottom: 20px;
  opacity: 0.4;
  font-size: 0.8rem;
}

/* ================= MAGAZINE ================= */
.magazine {
  height: 100vh;
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  background: #000;
}

.magazine::-webkit-scrollbar {
  display: none;
}

.page {
  min-width: 100vw;
  height: 100vh;
  scroll-snap-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* vertical image */
.page img.vertical {
  max-height: 90vh;
  max-width: 90vw;
  object-fit: contain;
}

/* horizontal spread (2 pages feel) */
.page.double {
  min-width: 200vw;
}

.page img.horizontal {
  width: 80vw;
  max-height: 90vh;
  object-fit: contain;
}

/* fade edges */
.magazine::before,
.magazine::after {
  content: "";
  position: absolute;
  top: 0;
  width: 80px;
  height: 100%;
  z-index: 2;
}

.magazine::before {
  left: 0;
  background: linear-gradient(to right, black, transparent);
}

.magazine::after {
  right: 0;
  background: linear-gradient(to left, black, transparent);
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>ICEMAN</h1>
  <div class="subtitle">A NEW ERA</div>
  <div id="countdown"></div>
  <div class="scroll-hint">SCROLL ↓</div>
</section>

<!-- MAGAZINE -->
<section class="magazine">

  <div class="page">
    <img src="img1.jpeg" class="vertical">
  </div>

  <div class="page double">
    <img src="img2.jpeg" class="horizontal">
  </div>

  <div class="page">
    <img src="img3.jpeg" class="vertical">
  </div>

</section>

<script>
// ================= COUNTDOWN =================
const releaseDate = new Date("2026-07-01T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = releaseDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "OUT NOW";
    return;
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const m = Math.floor((diff / (1000 * 60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerText =
    `${d} : ${h} : ${m} : ${s}`;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
