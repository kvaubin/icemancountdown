<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* -------- HERO -------- */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

h1 {
  font-size: 5rem;
  letter-spacing: 12px;
}

.subtitle {
  opacity: 0.5;
  margin: 20px 0;
  letter-spacing: 4px;
}

#countdown {
  font-size: 2rem;
}

/* scroll hint */
.scroll {
  position: absolute;
  bottom: 30px;
  font-size: 0.8rem;
  opacity: 0.4;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* -------- MAGAZINE -------- */
.magazine {
  height: 100vh;
  display: flex;
  align-items: center;
  overflow: hidden;
}

.mag-track {
  display: flex;
  height: 80%;
  transition: transform 0.4s ease;
}

.page {
  min-width: 100vw;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* vertical image (single page) */
.page img.vertical {
  height: 90%;
  object-fit: cover;
}

/* horizontal = double spread */
.page.double {
  min-width: 200vw;
}

.page img.horizontal {
  width: 90%;
  object-fit: cover;
}

/* subtle fade edges */
.magazine::before,
.magazine::after {
  content: "";
  position: absolute;
  width: 100px;
  height: 100%;
  z-index: 2;
  pointer-events: none;
}

.magazine::before {
  left: 0;
  background: linear-gradient(to right, black, transparent);
}

.magazine::after {
  right: 0;
  background: linear-gradient(to left, black, transparent);
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>ICEMAN</h1>
  <div class="subtitle">A NEW ERA</div>
  <div id="countdown"></div>
  <div class="scroll">SCROLL ↓</div>
</section>

<!-- MAGAZINE -->
<section class="magazine">
  <div class="mag-track" id="track">

    <!-- VERTICAL -->
    <div class="page">
      <img src="img1.jpeg" class="vertical">
    </div>

    <!-- HORIZONTAL (DOUBLE PAGE) -->
    <div class="page double">
      <img src="img2.jpeg" class="horizontal">
    </div>

    <!-- VERTICAL -->
    <div class="page">
      <img src="img3.jpeg" class="vertical">
    </div>

  </div>
</section>

<script>
/* COUNTDOWN */
const releaseDate = new Date("2026-05-15T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = releaseDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "OUT NOW";
    return;
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const m = Math.floor((diff / (1000 * 60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    `${d} : ${h} : ${m} : ${s}`;
}
setInterval(updateCountdown, 1000);

/* SWIPE LOGIC */
const track = document.getElementById("track");
let index = 0;

let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (diff > 50) index++;
  if (diff < -50) index--;

  index = Math.max(0, Math.min(index, track.children.length - 1));

  track.style.transform = `translateX(-${index * 100}vw)`;
});
</script>

</body>
</html>
