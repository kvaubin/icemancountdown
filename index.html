<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iceman</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  height: 100%;
  width: 100%;
}

/* FULLSCREEN container */
#magazine {
  width: 100vw;
  height: 100vh;
}

/* Pages = FULLSCREEN */
.page {
  width: 100%;
  height: 100%;
  background: #000;
}

/* Image = FULL BLEED */
.page img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Realistic lighting */
.turn-page {
  background: linear-gradient(to right, rgba(0,0,0,0.25), rgba(0,0,0,0));
}

/* Subtle depth when flipping */
.turn-page-wrapper {
  box-shadow: 0 0 60px rgba(0,0,0,0.9);
}
</style>
</head>

<body>

<div id="magazine">
  <div class="page"><img src="pages/1.jpg"></div>
  <div class="page"><img src="pages/2.jpg"></div>
  <div class="page"><img src="pages/3.jpg"></div>
  <div class="page"><img src="pages/4.jpg"></div>
  <div class="page"><img src="pages/5.jpg"></div>
  <div class="page"><img src="pages/6.jpg"></div>
</div>

<script>
const mag = $("#magazine");

mag.turn({
  width: window.innerWidth,
  height: window.innerHeight,
  display: "single",        // FULLSCREEN single page
  autoCenter: false,
  elevation: 80,            // stronger depth
  gradients: true,
  duration: 600             // smoother flip
});

/* Resize = always fullscreen */
window.addEventListener("resize", () => {
  mag.turn("size", window.innerWidth, window.innerHeight);
});

/* Click anywhere = next page */
document.addEventListener("click", (e) => {
  const x = e.clientX;
  if (x > window.innerWidth / 2) {
    mag.turn("next");
  } else {
    mag.turn("previous");
  }
});

/* Swipe (mobile) */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if (startX - endX > 50) mag.turn("next");
  if (endX - startX > 50) mag.turn("previous");
});
</script>

</body>
</html>
