<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN Magazine</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #050505;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero h1 {
  font-size: 5rem;
  letter-spacing: 12px;
}

#countdown {
  margin-top: 20px;
  font-size: 1.8rem;
  opacity: 0.7;
}

/* SCENE */
.magazine {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 3000px;
  background: #000;
}

/* BOOK */
.book {
  width: min(1200px, 92vw);
  aspect-ratio: 3 / 2;
  position: relative;
  transform-style: preserve-3d;
}

/* spine */
.book::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 0;
  width: 4px;
  height: 100%;
  background: rgba(255,255,255,0.08);
  transform: translateX(-50%);
  z-index: 10;
}

/* PAGE BASE */
.page {
  position: absolute;
  width: 50%;
  height: 100%;
  top: 0;
  overflow: hidden;
  transform-origin: left;
  background: #111;
  backface-visibility: hidden;
  box-shadow: inset 0 0 80px rgba(0,0,0,0.6);
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* LEFT PAGE */
.page.left {
  left: 0;
}

/* RIGHT PAGE */
.page.right {
  right: 0;
  transform-origin: left;
}

/* FLIP ANIMATION */
.page.flipping {
  animation: flip 0.9s ease forwards;
  z-index: 100;
}

@keyframes flip {
  0% {
    transform: rotateY(0deg);
  }
  50% {
    transform: rotateY(-90deg);
  }
  100% {
    transform: rotateY(-180deg);
  }
}

/* subtle lighting */
.book::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6));
  pointer-events: none;
}

/* nav hint */
.hint {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.5;
}

</style>
</head>
<body>

<section class="hero">
  <h1>ICEMAN</h1>
  <div id="countdown"></div>
</section>

<section class="magazine">
  <div class="book" id="book"></div>
</section>

<script>

/* COUNTDOWN */
const releaseDate = new Date("2026-07-01T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = releaseDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "OUT NOW";
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerText =
    `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

/* PAGES */
const pages = [
  { left: "img1.jpeg", right: "img2.jpeg" },
  { left: "img3.jpeg", right: "img4.jpeg" },
  { left: "img5.jpeg", right: "img6.jpeg" }
];

let index = 0;
const book = document.getElementById("book");

function render() {
  const p = pages[index];

  book.innerHTML = `
    <div class="page left">
      <img src="${p.left}" />
    </div>
    <div class="page right">
      <img src="${p.right}" />
    </div>
  `;
}

function flipNext() {
  const right = document.querySelector(".page.right");

  if (index < pages.length - 1) {
    right.classList.add("flipping");

    setTimeout(() => {
      index++;
      render();
    }, 600);
  }
}

function flipPrev() {
  if (index > 0) {
    index--;
    render();
  }
}

/* controls */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let diff = startX - e.changedTouches[0].clientX;

  if (diff > 50) flipNext();
  if (diff < -50) flipPrev();
});

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") flipNext();
  if (e.key === "ArrowLeft") flipPrev();
});

render();

</script>

</body>
</html>
