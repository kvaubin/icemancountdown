<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Iceman</title>

<style>
html, body {
  height: 100%;
  background: #000;
  color: white;
  overflow: hidden;
}

/* SCROLL */
.scroll-container {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}
.scroll-container::-webkit-scrollbar { display: none; }

section {
  height: 100vh;
  scroll-snap-align: start;
  position: relative;
}

/* HERO */
#hero {
  background: url('background.jpeg') center center / cover no-repeat;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}

#hero > * {
  position: relative;
  z-index: 1;
}

.logo img {
  width: 220px;
  object-fit: contain;
}

.countdown {
  font-size: 18px;
  color: #ddd;
  letter-spacing: 4px;
}

/* hint */
.scroll-hint {
  position: absolute;
  bottom: 30px;
  font-size: 11px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.4);
  animation: pulse 2.2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 0.3; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(4px); }
}

/* BOOKLET */
#booklet {
  background: #000;
  overflow: hidden;
}

.frame {
  width: 100%;
  height: 100%;
  position: relative;
}

.frame iframe {
  width: 120%;
  height: 120%;
  border: none;
  position: absolute;
  top: -10%;
  left: -10%;
}

/* LOADER */
.loader {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  transition: opacity 0.8s ease;
}

.loader.hide {
  opacity: 0;
  pointer-events: none;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* MOBILE */
@media (max-width:768px){
  .logo img { width: 160px; }
}
</style>
</head>

<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div class="scroll-container" id="scrollContainer">

  <!-- HERO -->
  <section id="hero">
    <div class="logo">
      <img src="logo.jpeg" />
    </div>

    <div class="countdown" id="countdown">Loading...</div>

    <div class="scroll-hint">↓ S C R O L L</div>
  </section>

  <!-- BOOK -->
  <section id="booklet">
    <div class="frame">
      <iframe src="book.html"></iframe>
    </div>
  </section>

</div>

<script>
/* COUNTDOWN */
const target = new Date("2026-05-01T00:00:00").getTime();
const countdownEl = document.getElementById("countdown");

function tick(){
  const now = Date.now();
  const diff = target - now;

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor(diff / (1000*60*60)%24);
  const m = Math.floor(diff / (1000*60)%60);
  const s = Math.floor(diff / 1000 % 60);

  countdownEl.textContent = `${d}D ${h}H ${m}M ${s}S`;
}
setInterval(tick,1000);
tick();

/* LOADER FIX */
const loader = document.getElementById("loader");
window.addEventListener("load",()=>{
  setTimeout(()=>loader.classList.add("hide"),600);
});

/* SCROLL FADE */
const scrollContainer = document.getElementById("scrollContainer");
const hero = document.getElementById("hero");

scrollContainer.addEventListener("scroll", () => {
  const progress = Math.min(scrollContainer.scrollTop / window.innerHeight, 1);
  hero.style.opacity = 1 - progress * 1.2;
});
</script>

</body>
</html>
