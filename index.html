<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN MAGAZINE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  color: white;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* ===== FULLSCREEN BOOK ===== */
.book {
  width: 100vw;
  height: 100vh;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* track of pages */
.track {
  display: flex;
  height: 100%;
  transition: transform 0.6s ease;
}

/* ===== PAGE BASE ===== */
.page {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* vertical image = single page */
.page.single img {
  max-height: 92vh;
  max-width: 92vw;
  object-fit: contain;
}

/* horizontal = full spread (2 pages feel) */
.page.spread {
  width: 200vw;
}

.page.spread img {
  width: 90vw;
  max-height: 92vh;
  object-fit: contain;
}

/* subtle fade edges like real paper */
.book::before,
.book::after {
  content: "";
  position: absolute;
  top: 0;
  width: 80px;
  height: 100%;
  z-index: 2;
  pointer-events: none;
}

.book::before {
  left: 0;
  background: linear-gradient(to right, black, transparent);
}

.book::after {
  right: 0;
  background: linear-gradient(to left, black, transparent);
}

</style>
</head>

<body>

<div class="book" id="book">
  <div class="track" id="track">

    <!-- PAGE 1 (vertical = 1 page) -->
    <div class="page single">
      <img src="img1.jpeg">
    </div>

    <!-- PAGE 2 (horizontal = spread) -->
    <div class="page spread">
      <img src="img2.jpeg">
    </div>

    <!-- PAGE 3 (vertical = 1 page) -->
    <div class="page single">
      <img src="img3.jpeg">
    </div>

  </div>
</div>

<script>
let index = 0;
const track = document.getElementById("track");
const pages = document.querySelectorAll(".page");

let startX = 0;

/* ===== SWIPE ===== */
document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (diff > 50) index++;      // swipe left → next page
  if (diff < -50) index--;     // swipe right → previous page

  index = Math.max(0, Math.min(index, pages.length - 1));

  track.style.transform = `translateX(-${index * 100}vw)`;
});

/* ===== DESKTOP SUPPORT ===== */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") index++;
  if (e.key === "ArrowLeft") index--;

  index = Math.max(0, Math.min(index, pages.length - 1));

  track.style.transform = `translateX(-${index * 100}vw)`;
});
</script>

</body>
</html>
