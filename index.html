<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iceman</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: #0b0b0b;
  color: white;
  overflow: hidden;
}

/* ===== HERO ===== */
.hero {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #0b0b0b;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 20;
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.hero.hidden {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}

.title {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: 6px;
  margin-bottom: 18px;
}

.countdown {
  font-size: 18px;
  color: #aaa;
  margin-bottom: 40px;
}

.singles {
  display: flex;
  gap: 18px;
  margin-bottom: 40px;
}

.single {
  width: 120px;
  height: 120px;
  background: #1a1a1a;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #777;
  transition: 0.3s;
}

.single:hover {
  transform: scale(1.05);
  background: #222;
}

.enter {
  padding: 12px 34px;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.enter:hover {
  background: white;
  color: black;
}

/* ===== HEADER ===== */
header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
  z-index: 10;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

header h1 {
  font-size: 16px;
  letter-spacing: 2px;
}

/* ===== VIEWER ===== */
.viewer {
  position: absolute;
  top: 70px;
  width: 100%;
  height: calc(100vh - 70px);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FRAME (side crop mask) */
.frame {
  width: 92%;
  height: 92%;
  background: #0b0b0b;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 0 0 14px #0b0b0b;
  position: relative;
}

/* ===== BOOK ZOOM (NO TOP CROP FIXED) ===== */
iframe {
  width: 100%;
  height: 100%;
  border: none;

  /* zoom ONLY (no translate = no top cut) */
  transform: scale(1.13);
  transform-origin: center;

  opacity: 0;
  transition: opacity 0.6s ease;
}

iframe.loaded {
  opacity: 1;
}

/* LOADER */
.loader {
  position: absolute;
  top: 70px;
  width: 100%;
  height: calc(100vh - 70px);
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b0b0b;
  z-index: 5;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* MOBILE */
@media (max-width: 768px) {
  .frame {
    width: 100%;
    height: 100%;
    border-radius: 0;
  }

  iframe {
    transform: scale(1.10);
  }
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="hero">
  <div class="title">ICEMAN</div>

  <div class="countdown" id="countdown">Loading...</div>

  <div class="singles">
    <div class="single">Single 1</div>
    <div class="single">Single 2</div>
    <div class="single">Single 3</div>
  </div>

  <div class="enter" onclick="enterSite()">ENTER</div>
</div>

<!-- HEADER -->
<header>
  <h1>ICEMAN</h1>
</header>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<!-- BOOK -->
<div class="viewer">
  <div class="frame">
    <iframe 
      id="flipbook"
      src="https://heyzine.com/flip-book/cd6c7fb93b.html#page/1"
      allowfullscreen>
    </iframe>
  </div>
</div>

<script>

/* ===== COUNTDOWN ===== */
const targetDate = new Date("2026-05-01T00:00:00").getTime();
const countdownEl = document.getElementById("countdown");

function updateCountdown() {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff <= 0) {
    countdownEl.innerHTML = "OUT NOW";
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  countdownEl.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

/* ===== ENTER ===== */
function enterSite() {
  document.getElementById("hero").classList.add("hidden");
}

/* ===== LOAD ===== */
const iframe = document.getElementById("flipbook");
const loader = document.getElementById("loader");

iframe.onload = () => {
  iframe.classList.add("loaded");
  loader.style.display = "none";
};

</script>

</body>
</html>
