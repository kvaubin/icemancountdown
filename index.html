<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

/* ================= HERO ================= */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero h1 {
  font-size: 5rem;
  letter-spacing: 12px;
}

#countdown {
  margin-top: 20px;
  font-size: 2rem;
  opacity: 0.8;
}

.scroll {
  position: absolute;
  bottom: 20px;
  opacity: 0.4;
}

/* ================= FLIPBOOK SECTION ================= */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0a0a0a;
}

/* book container */
#book {
  width: 90vw;
  height: 90vh;
}
</style>
</head>

<body>

<!-- ================= HERO PAGE ================= -->
<section class="hero">
  <h1>ICEMAN</h1>
  <div id="countdown"></div>
  <div class="scroll">↓ scroll</div>
</section>

<!-- ================= FLIPBOOK ================= -->
<section class="section">

  <div id="book">

    <div data-density="hard">
      <img src="img1.jpeg" style="width:100%;height:100%;object-fit:contain;">
    </div>

    <div>
      <img src="img2.jpeg" style="width:100%;height:100%;object-fit:contain;">
    </div>

    <div>
      <img src="img3.jpeg" style="width:100%;height:100%;object-fit:contain;">
    </div>

  </div>

</section>

<!-- ================= LIBRARY ================= -->
<script src="https://unpkg.com/stpageflip/dist/js/page-flip.browser.min.js"></script>

<script>

/* ===== COUNTDOWN ===== */
const releaseDate = new Date("2026-07-01T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = releaseDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "OUT NOW";
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerText =
    `${d}d ${h}h ${m}m ${s}s`;
}
setInterval(updateCountdown, 1000);
updateCountdown();


/* ===== APPLE BOOKS STYLE FLIPBOOK ===== */
const pageFlip = new St.PageFlip(document.getElementById("book"), {
  width: 400,
  height: 600,
  size: "stretch",
  maxShadowOpacity: 0.5,
  showCover: false,
  mobileScrollSupport: true
});

pageFlip.loadFromHTML(document.querySelectorAll("#book > div"));

</script>

</body>
</html>
