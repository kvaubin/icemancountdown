<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN Magazine</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #050505;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero h1 {
  font-size: 5rem;
  letter-spacing: 12px;
}

#countdown {
  margin-top: 20px;
  font-size: 1.8rem;
  opacity: 0.7;
}

/* MAGAZINE STAGE */
.magazine {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
  perspective: 2500px;
}

/* MAGAZINE BOOK */
.book {
  width: min(1200px, 92vw);
  aspect-ratio: 3 / 2;
  position: relative;
  transform-style: preserve-3d;
  box-shadow: 0 40px 120px rgba(0,0,0,0.85);
  background: #111;
}

/* spine */
.book::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 0;
  width: 4px;
  height: 100%;
  background: rgba(255,255,255,0.08);
  transform: translateX(-50%);
  z-index: 10;
}

/* PAGES WRAPPER */
.pages {
  display: flex;
  width: 100%;
  height: 100%;
}

/* PAGE */
.page {
  width: 50%;
  height: 100%;
  background: #0b0b0b;
  position: relative;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px;
}

/* realistic paper texture */
.page::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.06), transparent 60%);
  pointer-events: none;
}

/* image inside page (like real print) */
.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: contrast(1.05) saturate(1.05);
  z-index: 2;
}

/* page shadows */
.page.left {
  box-shadow: inset -40px 0 80px rgba(0,0,0,0.7);
}

.page.right {
  box-shadow: inset 40px 0 80px rgba(0,0,0,0.7);
}

/* cover feel */
.book {
  border-radius: 2px;
}

</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <h1>ICEMAN</h1>
  <div id="countdown"></div>
</section>

<!-- MAGAZINE -->
<section class="magazine">
  <div class="book" id="book"></div>
</section>

<script>

/* COUNTDOWN */
const releaseDate = new Date("2026-07-01T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = releaseDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "OUT NOW";
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerText =
    `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

/* MAGAZINE DATA (REAL BOOK STYLE) */
const pages = [
  { left: "img1.jpeg", right: "img2.jpeg" },
  { left: "img3.jpeg", right: "img4.jpeg" },
  { left: "img5.jpeg", right: "img6.jpeg" }
];

let index = 0;
const book = document.getElementById("book");

function render() {
  const item = pages[index];

  book.innerHTML = `
    <div class="pages">
      <div class="page left">
        <img src="${item.left}" />
      </div>
      <div class="page right">
        <img src="${item.right}" />
      </div>
    </div>
  `;
}

function next() {
  if (index < pages.length - 1) {
    index++;
    render();
  }
}

function prev() {
  if (index > 0) {
    index--;
    render();
  }
}

/* swipe */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let diff = startX - e.changedTouches[0].clientX;

  if (diff > 50) next();
  if (diff < -50) prev();
});

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

render();

</script>

</body>
</html>
