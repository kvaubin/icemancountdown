<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iceman</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0b0b0b;
      color: white;
    }

    /* ===== SCROLL CONTAINER ===== */
    .scroll-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* ===== SECTIONS ===== */
    section {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* ===== HERO ===== */
    #hero {
      background: #0b0b0b;
      transition: background 0.8s ease;
      gap: 24px;
    }

    .logo {
      font-size: 64px;
      font-weight: 800;
      letter-spacing: 10px;
      text-transform: uppercase;
    }

    .countdown {
      font-size: 20px;
      color: #aaa;
      letter-spacing: 3px;
    }

    .singles {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 860px;
      padding: 0 16px;
    }

    .singles iframe {
      width: 260px;
      height: 150px;
      border-radius: 14px;
      border: none;
      overflow: hidden;
    }

    .scroll-hint {
      position: absolute;
      bottom: 28px;
      font-size: 12px;
      letter-spacing: 3px;
      color: #555;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ===== BOOKLET ===== */
    #booklet {
      background: #050505;
      padding: 0;
    }

    .frame {
      width: 96%;
      height: 92vh;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(255,255,255,0.04);
    }

    .frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      transform: scale(1.12);
      transform-origin: center;
    }

    /* ===== LOADER ===== */
    .loader {
      position: fixed;
      inset: 0;
      background: #0b0b0b;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.6s ease;
    }
    .loader.hide { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .logo { font-size: 42px; letter-spacing: 6px; }
      .singles iframe { width: 90vw; height: 140px; }
      .frame { width: 100%; height: 94vh; border-radius: 0; }
      .frame iframe { transform: scale(1.08); }
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="scroll-container" id="scrollContainer">

    <!-- HERO SECTION -->
    <section id="hero">
      <div class="logo">ICEMAN</div>
      <div class="countdown" id="countdown">Loading...</div>

      <div class="singles">
        <!-- Replace src with real Apple Music embed URLs -->
        <iframe
          allow="autoplay *; encrypted-media *; fullscreen *"
          sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
          src="PASTE_WHAT_DID_I_MISS_URL_HERE">
        </iframe>
        <iframe
          allow="autoplay *; encrypted-media *; fullscreen *"
          sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
          src="PASTE_WHICH_ONE_URL_HERE">
        </iframe>
        <iframe
          allow="autoplay *; encrypted-media *; fullscreen *"
          sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
          src="PASTE_DOG_HOUSE_URL_HERE">
        </iframe>
      </div>

      <div class="scroll-hint">↓ SCROLL</div>
    </section>

    <!-- BOOKLET SECTION -->
    <section id="booklet">
      <div class="frame">
        <iframe
          id="flipbook"
          src="https://heyzine.com/flip-book/cd6c7fb93b.html#page/1"
          allowfullscreen>
        </iframe>
      </div>
    </section>

  </div>

  <script>
    // COUNTDOWN
    const target = new Date("2026-05-01T00:00:00").getTime();
    const el = document.getElementById("countdown");

    function tick() {
      const diff = target - Date.now();
      if (diff <= 0) { el.textContent = "OUT NOW"; return; }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff / 3600000) % 24);
      const m = Math.floor((diff / 60000) % 60);
      const s = Math.floor((diff / 1000) % 60);
      el.textContent = `${d}d ${h}h ${m}m ${s}s`;
    }
    setInterval(tick, 1000);
    tick();

    // HIDE LOADER
    const flipbook = document.getElementById("flipbook");
    const loader = document.getElementById("loader");
    flipbook.onload = () => loader.classList.add("hide");
    setTimeout(() => loader.classList.add("hide"), 4000); // fallback

    // HERO BG DARKENS AS YOU SCROLL INTO BOOKLET
    const scrollContainer = document.getElementById("scrollContainer");
    const hero = document.getElementById("hero");

    scrollContainer.addEventListener("scroll", () => {
      const progress = scrollContainer.scrollTop / window.innerHeight;
      const brightness = Math.max(0, 1 - progress * 1.5);
      hero.style.opacity = brightness;
    });
  </script>

</body>
</html>
