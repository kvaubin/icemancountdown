<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iceman</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: #0b0b0b;
  color: white;
  overflow: hidden;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 30px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 10;
}

header h1 {
  font-size: 18px;
  font-weight: 600;
}

/* COUNTDOWN */
.countdown {
  font-size: 14px;
  color: #aaa;
  letter-spacing: 1px;
}

/* VIEWER AREA */
.viewer {
  position: absolute;
  top: 70px;
  width: 100%;
  height: calc(100vh - 70px);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FRAME (this is the trick) */
.frame {
  position: relative;
  width: 95%;
  height: 95%;
  background: #0b0b0b;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 0 8px #0b0b0b; /* blends edges */
}

/* IFRAME */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  transform: scale(1.02); /* zoom slightly to push logo out */
  transform-origin: center;
  opacity: 0;
  transition: opacity 0.6s ease;
}

iframe.loaded {
  opacity: 1;
}

/* LOADER */
.loader {
  position: absolute;
  top: 70px;
  width: 100%;
  height: calc(100vh - 70px);
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b0b0b;
  z-index: 5;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* MOBILE */
@media (max-width: 768px) {
  header {
    height: 60px;
  }

  .viewer, .loader {
    top: 60px;
    height: calc(100vh - 60px);
  }

  .frame {
    width: 100%;
    height: 100%;
    border-radius: 0;
  }
}
</style>
</head>

<body>

<header>
  <h1>ICEMAN</h1>
  <div class="countdown" id="countdown">Loading...</div>
</header>

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div class="viewer">
  <div class="frame">
    <iframe 
      id="flipbook"
      src="https://heyzine.com/flip-book/46b787281d.html"
      allowfullscreen>
    </iframe>
  </div>
</div>

<script>
// ===== COUNTDOWN =====
// 👉 CHANGE THIS DATE
const targetDate = new Date("2026-05-01T00:00:00").getTime();

const countdownEl = document.getElementById("countdown");

function updateCountdown() {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff <= 0) {
    countdownEl.innerHTML = "OUT NOW";
    return;
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const m = Math.floor((diff / (1000 * 60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  countdownEl.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

// ===== LOAD EFFECT =====
const iframe = document.getElementById("flipbook");
const loader = document.getElementById("loader");

iframe.onload = () => {
  iframe.classList.add("loaded");
  loader.style.display = "none";
};
</script>

</body>
</html>
