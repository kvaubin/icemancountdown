<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #050505;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ================= HERO ================= */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 5rem;
  letter-spacing: 12px;
  font-weight: 600;
}

#countdown {
  margin-top: 20px;
  font-size: 1.8rem;
  opacity: 0.7;
}

.scroll {
  position: absolute;
  bottom: 20px;
  opacity: 0.3;
  font-size: 12px;
}

/* ================= MAGAZINE ================= */
.magazine {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #111, #000);
}

/* REAL MAGAZINE PROPORTION (KEY FIX) */
.book {
  width: min(1200px, 92vw);
  aspect-ratio: 3 / 2; /* 👈 THIS fixes the “wrong size” issue */
  display: flex;
  position: relative;
  box-shadow: 0 40px 120px rgba(0,0,0,0.85);
}

/* spine */
.book::before {
  content: "";
  position: absolute;
  left: 50%;
  width: 2px;
  height: 100%;
  background: rgba(255,255,255,0.08);
  transform: translateX(-50%);
  z-index: 10;
}

/* pages */
.page {
  width: 50%;
  height: 100%;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b0b0b;
}

/* images */
.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  user-select: none;
  pointer-events: none;
}

/* subtle print feel */
.page::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.4));
  pointer-events: none;
}

</style>
</head>

<body>

<!-- ================= PAGE 1 ================= -->
<section class="hero">
  <h1>ICEMAN</h1>
  <div id="countdown"></div>
  <div class="scroll">↓ scroll</div>
</section>

<!-- ================= PAGE 2 ================= -->
<section class="magazine">

  <div class="book">

    <div class="page left" id="left"></div>
    <div class="page right" id="right"></div>

  </div>

</section>

<script>

/* ================= COUNTDOWN ================= */
const releaseDate = new Date("2026-07-01T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = releaseDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "OUT NOW";
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerText =
    `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

/* ================= MAGAZINE DATA ================= */
const pages = [
  { type: "single", src: "img1.jpeg" },
  { type: "spread", src: "img2.jpeg" },
  { type: "single", src: "img3.jpeg" }
];

let index = 0;

const left = document.getElementById("left");
const right = document.getElementById("right");

/* ================= RENDER ================= */
function render() {
  const p = pages[index];

  if (!p) return;

  // ================= SPREAD IMAGE =================
  if (p.type === "spread") {
    left.innerHTML = `
      <img src="${p.src}"
      style="
        width: 200%;
        height: 100%;
        object-fit: cover;
        transform: translateX(-25%);
      ">
    `;
    right.innerHTML = "";
    return;
  }

  // ================= NORMAL =================
  left.innerHTML = `<img src="${p.src}">`;
  right.innerHTML = `<img src="${pages[index+1]?.src || ''}">`;
}

/* ================= NAV ================= */
function next() {
  if (index < pages.length - 1) {
    index++;
    render();
  }
}

function prev() {
  if (index > 0) {
    index--;
    render();
  }
}

/* ================= SWIPE ================= */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let diff = startX - e.changedTouches[0].clientX;

  if (diff > 50) next();
  if (diff < -50) prev();
});

/* keyboard */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

render();

</script>

</body>
</html>
