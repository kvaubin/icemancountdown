<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEMAN</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #050505;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ================= HERO ================= */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero h1 {
  font-size: 5rem;
  letter-spacing: 12px;
}

#countdown {
  margin-top: 20px;
  font-size: 1.8rem;
  opacity: 0.7;
}

/* ================= MAGAZINE ================= */
.magazine {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}

/* REAL OPEN BOOK FRAME */
.book {
  width: min(1200px, 92vw);
  aspect-ratio: 3 / 2;
  position: relative;
  overflow: hidden;
  box-shadow: 0 40px 120px rgba(0,0,0,0.85);
  border-radius: 2px;
}

/* spine */
.book::before {
  content: "";
  position: absolute;
  left: 50%;
  width: 2px;
  height: 100%;
  background: rgba(255,255,255,0.08);
  transform: translateX(-50%);
  z-index: 5;
}

/* THE IMAGE IS THE WHOLE BOOK SURFACE */
.spread {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: opacity 0.4s ease;
}

/* optional dark paper depth */
.book::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.5));
  pointer-events: none;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>ICEMAN</h1>
  <div id="countdown"></div>
</section>

<!-- MAGAZINE -->
<section class="magazine">
  <div class="book" id="book"></div>
</section>

<script>

/* ================= COUNTDOWN ================= */
const releaseDate = new Date("2026-07-01T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = releaseDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "OUT NOW";
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerText =
    `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

/* ================= MAGAZINE DATA ================= */
const pages = [
  { type: "single", src: "img1.jpeg" },
  { type: "spread", src: "img2.jpeg" },
  { type: "single", src: "img3.jpeg" }
];

let index = 0;

const book = document.getElementById("book");

/* ================= RENDER ================= */
function render() {
  const item = pages[index];
  if (!item) return;

  let style = "";

  if (item.type === "spread") {
    /* FULL BOOK COVER IMAGE (NO SPLIT) */
    style = `
      background-image: url('${item.src}');
    `;
  } else {
    style = `
      background-image: url('${item.src}');
    `;
  }

  book.innerHTML = `<div class="spread" style="${style}"></div>`;
}

/* ================= NAV ================= */
function next() {
  if (index < pages.length - 1) {
    index++;
    render();
  }
}

function prev() {
  if (index > 0) {
    index--;
    render();
  }
}

/* swipe */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let diff = startX - e.changedTouches[0].clientX;

  if (diff > 50) next();
  if (diff < -50) prev();
});

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

render();

</script>

</body>
</html>
